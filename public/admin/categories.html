<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voltora Admin - Categories</title>
    <link rel="icon" type="image/svg+xml" href="/images/logo.svg" />
    <link rel="stylesheet" href="../css/output.css" />
  </head>
  <body class="bg-gray-50 min-h-screen flex flex-col antialiased mt-14">
    <!-- Navbar -->
    <nav
      class="bg-neutral-primary fixed w-full z-50 top-0 inset-s-0 border-b border-default"
    >
      <div
        class="max-w-full flex flex-wrap items-center justify-between mx-auto p-4 px-6"
      >
        <a href="#" class="flex items-center space-x-3 rtl:space-x-reverse">
          <img src="../images/logo.svg" class="h-7" alt="Voltora Logo" />
          <span
            class="self-center text-xl text-cyan-700 font-semibold whitespace-nowrap"
            >Voltora</span
          >
        </a>
        <div class="inline-flex space-x-3 md:space-x-0 rtl:space-x-reverse">
          <button
            id="logoutBtn"
            type="button"
            class="text-white bg-red-600 hover:bg-red-700 box-border border border-transparent shadow-xs font-medium leading-5 rounded-base text-sm px-3 py-2 focus:outline-none transition-colors"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- Sidebar -->
    <button
      data-drawer-target="logo-sidebar"
      data-drawer-toggle="logo-sidebar"
      aria-controls="logo-sidebar"
      type="button"
      class="text-heading bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-4 focus:ring-neutral-tertiary font-medium leading-5 rounded-base ms-3 mt-20 text-sm p-2 focus:outline-none inline-flex sm:hidden fixed z-50"
    >
      <span class="sr-only">Open sidebar</span>
      <svg
        class="w-6 h-6"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="none"
        viewBox="0 0 24 24"
      >
        <path
          stroke="currentColor"
          stroke-linecap="round"
          stroke-width="2"
          d="M5 7h14M5 12h14M5 17h10"
        />
      </svg>
    </button>

    <aside
      id="logo-sidebar"
      class="fixed top-0 left-0 z-40 w-64 h-full pt-16 transition-transform -translate-x-full sm:translate-x-0"
      aria-label="Sidebar"
    >
      <div
        class="h-full px-3 py-4 overflow-y-auto bg-neutral-primary-soft border-e border-default flex flex-col justify-between"
      >
        <ul class="space-y-2 font-medium">
          <li>
            <a
              href="/categories"
              class="flex items-center px-2 py-1.5 text-fg-brand bg-neutral-tertiary rounded-base font-semibold group"
            >
              <svg
                class="shrink-0 w-5 h-5 text-fg-brand"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 6h.008v.008H6V6Z"
                />
              </svg>
              <span class="ms-3">Category</span>
            </a>
          </li>
          <li>
            <a
              href="/products"
              class="flex items-center px-2 py-1.5 text-body rounded-base hover:bg-neutral-tertiary hover:text-fg-brand group"
            >
              <svg
                class="shrink-0 w-5 h-5 transition duration-75 group-hover:text-fg-brand"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"
                />
              </svg>
              <span class="ms-3">Products</span>
            </a>
          </li>
          <li class="hidden" id="users-menu">
            <a
              href="/users"
              class="flex items-center px-2 py-1.5 text-body rounded-base hover:bg-neutral-tertiary hover:text-fg-brand group"
            >
              <svg
                class="shrink-0 w-5 h-5 transition duration-75 group-hover:text-fg-brand"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"
                />
              </svg>
              <span class="ms-3">Users</span>
            </a>
          </li>
        </ul>
      </div>
    </aside>

    <!-- Modal Add Category -->
    <div
      id="category-modal"
      tabindex="-1"
      aria-hidden="true"
      class="hidden fixed inset-0 z-50 justify-center items-center w-full h-full overflow-y-auto overflow-x-hidden bg-gray-900/50 flex transition-opacity duration-300"
    >
      <div class="relative p-4 w-full max-w-md max-h-full">
        <div
          class="relative bg-neutral-primary-soft rounded-base shadow-sm border border-default"
        >
          <div
            class="flex items-center justify-between p-4 md:p-5 border-b border-default-medium rounded-t"
          >
            <h3 class="text-lg font-semibold text-heading">
              Create New Category
            </h3>
            <button
              type="button"
              id="closeModalBtn"
              class="text-body bg-transparent hover:bg-neutral-secondary-medium hover:text-heading rounded-base text-sm w-8 h-8 ms-auto inline-flex justify-center items-center focus:outline-none"
            >
              <svg
                class="w-3 h-3"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 14 14"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
                />
              </svg>
              <span class="sr-only">Close modal</span>
            </button>
          </div>

          <form id="categoryForm" class="p-4 md:p-5">
            <div class="grid gap-4 mb-4 grid-cols-2">
              <div class="col-span-2">
                <label
                  for="categoryName"
                  class="block mb-2 text-sm font-medium text-heading"
                  >Category Name</label
                >
                <input
                  type="text"
                  id="categoryName"
                  name="name"
                  class="bg-neutral-primary border border-default text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-2.5 focus:outline-none placeholder-fg-disabled"
                  placeholder="Type category name (e.g., Audio)"
                  required
                />
              </div>
            </div>
            <button
              type="submit"
              class="text-white inline-flex items-center bg-brand hover:bg-brand-strong font-medium rounded-base text-sm px-5 py-2.5 text-center transition-colors"
            >
              <svg
                class="me-1 -ms-1 w-5 h-5"
                fill="currentColor"
                viewBox="0 0 20 20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  fill-rule="evenodd"
                  d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"
                  clip-rule="evenodd"
                ></path>
              </svg>
              Save Category
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div
      id="delete-confirm-modal"
      tabindex="-1"
      class="hidden fixed inset-0 z-50 justify-center items-center w-full h-full overflow-y-auto overflow-x-hidden bg-gray-900/50 flex transition-opacity duration-300"
    >
      <div class="relative p-4 w-full max-w-md max-h-full">
        <div
          class="relative bg-neutral-primary-soft rounded-base shadow-sm border border-default p-4 text-center md:p-5"
        >
          <svg
            class="mx-auto mb-4 text-gray-400 w-12 h-12"
            aria-hidden="true"
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 20 20"
          >
            <path
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10 11V6m0 8h.01M19 10a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>

          <h3
            id="delete-modal-text"
            class="mb-5 text-lg font-normal text-body"
          ></h3>

          <div class="flex justify-center gap-3">
            <button
              id="deleteBtn"
              type="button"
              class="text-white bg-red-600 hover:bg-red-700 font-medium rounded-base text-sm inline-flex items-center px-5 py-2.5 text-center transition-colors"
            >
              Ya
            </button>
            <button
              id="cancelDeleteBtn"
              type="button"
              class="py-2.5 px-5 text-sm font-medium text-heading bg-neutral-primary border border-default rounded-base hover:bg-neutral-secondary-medium focus:outline-none transition-colors"
            >
              Batal
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div
      id="edit-category-modal"
      tabindex="-1"
      aria-hidden="true"
      class="hidden fixed inset-0 z-50 justify-center items-center w-full h-full overflow-y-auto overflow-x-hidden bg-gray-900/50 flex transition-opacity duration-300"
    >
      <div class="relative p-4 w-full max-w-md max-h-full">
        <div
          class="relative bg-neutral-primary-soft rounded-base shadow-sm border border-default"
        >
          <!-- Header Modal -->
          <div
            class="flex items-center justify-between p-4 md:p-5 border-b border-default-medium rounded-t"
          >
            <h3 class="text-lg font-semibold text-heading">Edit Category</h3>
            <button
              type="button"
              id="closeEditModalBtn"
              class="text-body bg-transparent hover:bg-neutral-secondary-medium hover:text-heading rounded-base text-sm w-8 h-8 ms-auto inline-flex justify-center items-center focus:outline-none"
            >
              <svg
                class="w-3 h-3"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 14 14"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
                />
              </svg>
              <span class="sr-only">Close modal</span>
            </button>
          </div>

          <!-- Form Edit Modal -->
          <form id="editCategoryForm" class="p-4 md:p-5">
            <input type="hidden" id="editCategoryId" />

            <div class="grid gap-4 mb-4 grid-cols-2">
              <div class="col-span-2">
                <label
                  for="editCategoryName"
                  class="block mb-2 text-sm font-medium text-heading"
                  >Category Name</label
                >
                <input
                  type="text"
                  id="editCategoryName"
                  name="name"
                  class="bg-neutral-primary border border-default text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-2.5 focus:outline-none placeholder-fg-disabled"
                  placeholder="Type category name"
                  required
                />
              </div>
            </div>
            <button
              type="submit"
              class="text-white inline-flex items-center bg-brand hover:bg-brand-strong font-medium rounded-base text-sm px-5 py-2.5 text-center transition-colors"
            >
              <svg
                class="me-1 -ms-1 w-5 h-5"
                fill="currentColor"
                viewBox="0 0 20 20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"
                ></path>
                <path
                  fill-rule="evenodd"
                  d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"
                  clip-rule="evenodd"
                ></path>
              </svg>
              Update Category
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Content -->
    <main class="p-6 sm:p-8 pt-28 sm:ml-64 grow flex flex-col">
      <div class="mb-6 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-heading">Categories Management</h1>

        <button
          type="button"
          id="openModalBtn"
          class="text-white bg-brand hover:bg-brand-strong font-medium rounded-base text-sm px-4 py-2 flex items-center gap-2 transition-colors"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 4.5v15m7.5-7.5h-15"
            />
          </svg>
          Add Category
        </button>
      </div>

      <div
        id="alert-container"
        class="hidden p-4 mb-4 text-sm rounded-base flex items-center gap-2 transition-all"
        role="alert"
      >
        <svg
          class="shrink-0 inline w-4 h-4"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>

        <div>
          <span id="alert-message" class="font-medium"></span>
        </div>
      </div>

      <!-- Table Categories -->
      <div
        class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default"
      >
        <table class="w-full text-sm text-left rtl:text-right text-body">
          <thead
            class="text-sm text-body bg-neutral-secondary-medium border-b border-default-medium"
          >
            <tr>
              <th scope="col" class="px-6 py-3 font-medium w-24">ID</th>
              <th scope="col" class="px-6 py-3 font-medium">Category Name</th>
              <th scope="col" class="px-6 py-3 font-medium text-right w-36">
                Actions
              </th>
            </tr>
          </thead>

          <tbody id="category-table-body"></tbody>
        </table>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="bg-neutral-primary-soft border-t border-default py-4 px-6 text-center text-xs text-gray-400 sm:ml-64 mt-auto"
    >
      <p>Copyright © 2026 Voltora Tech. Designed by me</p>
    </footer>

    <!-- Script -->
    <script src="../js/utils/alert.js"></script>
    <script src="../js/usersMenu.js"></script>
    <script type="module" src="../js/categories.js"></script>
    <script src="../js/auth.js"></script>
  </body>
</html>
